<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Torre de Controle - Rodotransfer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f4eb; margin: 0; }
        header { background: white; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .container { padding: 40px; }
        h1 { font-size: 32px; color: #1a1a1a; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #efe9e1; padding: 25px; border-radius: 8px; border-left: 5px solid transparent; transition: 0.3s; position: relative; }
        .card:hover { border-left: 5px solid #e4a694; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card h3 { margin: 0 0 10px 0; color: #1a1a1a; }
        .card p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .btn-view { text-decoration: none; display: block; text-align: center; padding: 10px; border: 1px solid #ddd; border-radius: 4px; color: #333; transition: 0.3s; font-weight: bold; }
        .btn-view:hover { background: #e4a694; color: white; border-color: #e4a694; }
        .logout { text-decoration: none; color: #333; font-weight: bold; border: 1px solid #ccc; padding: 5px 15px; border-radius: 4px; }
        .logout:hover { background: #eee; }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="{{ url_for('static', filename='logo.png') }}" height="75" alt="Logo">
            <span style="font-size: 20px; color: #008b8b; font-weight: bold; border-left: 2px solid #ccc; padding-left: 15px;">Torre de Controle</span>
        </div>
        <div>
            <span>Bem-vindo, <strong>{{ user }}</strong></span> | 
            <a href="{{ url_for('logout') }}" class="logout">Sair</a>
        </div>
    </header>
    <div class="container">
        <h1>Relatórios Disponíveis</h1>
        <p>Selecione um painel para monitoramento em tempo real</p>
        <div class="grid">
            {% for report in reports %}
            <div class="card">
                <h3>{{ report.title }}</h3>
                <p>Gestão de indicadores e performance de {{ report.title.lower() }}.</p>
                <a href="{{ url_for('report', report_id=report.id) }}" class="btn-view">Visualizar Relatório</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
