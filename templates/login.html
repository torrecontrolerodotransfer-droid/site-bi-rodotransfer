<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rodotransfer - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f4eb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
        .logo { width: 150px; margin-bottom: 20px; }
        .container { background: #efe9e1; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        h1 { color: #1a1a1a; margin-bottom: 5px; font-size: 28px; }
        p { color: #008b8b; margin-bottom: 30px; font-weight: bold; }
        label { display: block; text-align: left; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #444; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; background: #e6e0d8; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 4px; background-color: #e4a694; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #d18e7b; }
    </style>
</head>

<body>
    <img src="{{ url_for('static', filename='logo.png') }}" style="width: 300px; margin-bottom: 20px;" alt="Logo Rodotransfer">
    
    <p style="color: #008b8b; margin-bottom: 30px; font-weight: bold; font-family: 'Segoe UI', sans-serif;">Centro de Operações Logísticas</p>
    
    <div class="container">
        <form method="POST">
            <label>Usuário</label>
            <input type="text" name="username" placeholder="Digite seu usuário" required>
            <label>Senha</label>
            <input type="password" name="password" placeholder="Digite sua senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
