<!DOCTYPE html>
<html>

<head>
<title>{{ report.title }}</title>
</head>

<body>

<a href="{{ url_for('dashboard') }}">Voltar</a>

<h2>{{ report.title }}</h2>

<iframe id="biFrame" width="100%" height="800"></iframe>

<script>

async function carregarRelatorio(){

    const path = window.location.pathname
    const reportId = path.split("/").pop()

    const response = await fetch("/api/report/" + reportId)

    const data = await response.json()

    if(data.url){

        const antiCache = new Date().getTime()

        document.getElementById("biFrame").src =
        data.url + "&t=" + antiCache

    }else{

        document.body.innerHTML = "Acesso negado"

    }

}

carregarRelatorio()

</script>

<script>

setInterval(function(){

location.reload()

},120000)

</script>

</body>

</html>
