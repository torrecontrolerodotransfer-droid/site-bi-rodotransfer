<!DOCTYPE html>
<html>
<body>

<a href="{{ url_for('dashboard') }}">Voltar</a>

<h2>{{ report.title }}</h2>

<iframe id="biFrame" width="100%" height="800"></iframe>

<script>

async function carregarRelatorio(){

    const path = window.location.pathname
    const reportId = path.split("/").pop()

    const response = await fetch("/api/report/" + reportId)

    const data = await response.json()

    if(data.url){

        document.getElementById("biFrame").src = data.url

    }else{

        document.body.innerHTML = "Acesso negado"

    }

}

carregarRelatorio()

</script>

</body>
</html>
